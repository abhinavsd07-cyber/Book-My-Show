# 2. EXECUTIVE SUMMARY

CineBook is a highly advanced, production-grade event ticketing platform built using the MERN stack. Unlike basic CRUD applications, CineBook mirrors the complexities of real-world enterprise systems like BookMyShow. It seamlessly handles concurrent booking logic, real-time seat locking via WebSockets (Socket.io), and live payment processing using the Stripe API.

The system incorporates a robust loyalty program (`CineCoins`), real-time dynamic pricing (calculating Base Price + 5% Convenience Fee + 18% GST), automated email confirmations using Nodemailer, and in-browser PDF ticket generation using `jspdf`. With a beautifully crafted frontend utilizing Tailwind CSS, React Query for sub-second data fetching, and Zustand for state management, CineBook is a testament to top-tier full-stack engineering.

# 3. PROJECT OVERVIEW

CineBook provides a frictionless ticket booking experience that merges aesthetic UI design with intense backend transactional logic. 

**Goals & Scope:**
* **Real-time Synchronization:** Ensure users see seat availability live as others book.
* **Complex E-commerce Flow:** Handle movies, live events, premieres, seat-specific pricing, and food/beverage add-ons in a single checkout.
* **Loyalty Integration:** Implement a virtual currency system (CineCoins) to reward users.
* **Enterprise Admin Tools:** Provide theater operators with dashboards to manage screens, shows, and revenue, backed by AWS S3 image hosting.

This project is a **scalable architecture exercise** designed specifically to solve race conditions (double bookings), integrate 3rd-party SDKs (Stripe, AWS), and build normalized NoSQL database structures.

# 4. PROBLEM STATEMENT

In digital ticketing, the highest point of failure occurs during concurrency—when multiple users attempt to book the exact same seat simultaneously. Additionally, most booking platforms lack real-time UI updates, resulting in users progressing to checkout only to face "seat already taken" errors. 

CineBook solves this by broadcasting `seatsBooked` events via Socket.io instantly to all connected clients viewing that specific show. Furthermore, it validates the transaction atomically on the backend right before creating the Stripe Payment Intent, ensuring 100% data integrity and zero double-bookings.

# 9. SYSTEM ARCHITECTURE OVERVIEW

CineBook utilizes a **Monolithic Client-Server Architecture** heavily enhanced by **Event-Driven WebSockets**.

* **Frontend:** React application that manages local state (selected seats, cart) and global state (Zustand). It listens to specific Socket.io rooms based on the `showId` the user is currently viewing.
* **Backend:** Express REST API. Includes controllers for Auth, Movies, Shows, Bookings, and Payments. Contains a Socket.io server instance attached to the HTTP server.
* **Database:** MongoDB. Highly relational references (`Booking` refs `User`, `Movie`, `Show`). 

---

# 10. DETAILED MODULE-WISE EXPLANATION

### 1. Booking & Real-time Module (The Core)
* **Purpose:** Process complex cart data and ensure transactional integrity.
* **Logic (`bookingController.js`):** 
  - Retrieves `req.body` (showId, seats, foodItems, useCoins, stripePaymentIntentId).
  - Validates seat arrays dynamically against specific tiers (`show.seats[type].bookedSeats.includes(seatNumber)`).
  - Calculates financials natively (Base + Food + 5% Fee + 18% GST).
  - Applies CineCoin logic (Subtracts coins used, adds 5% of new total to `coinsEarned`).
  - Pushes seats to MongoDB, fires `io.to(showId).emit("seatsBooked")`.
  - Dispatches Nodemailer email with Ticket details.

### 2. Payment Module (Stripe SDK)
* **Purpose:** Secure financial transactions.
* **Logic (`paymentController.js`):** `createPaymentIntent` takes an amount, rounds it, multiplies by 100 (Stripe uses Paise), sets currency to `inr`, and attaches metadata (User ID/Email).

### 3. Inventory & AWS Storage Module
* **Purpose:** Core catalog data handling.
* **Logic:** When Admin creates a movie, `multer-s3` intercepts the `multipart/form-data` and streams the poster image directly to an AWS S3 Bucket, saving only the S3 URL in MongoDB.

# 11. FRONTEND ARCHITECTURE AND WORKING

**State Management Strategy:**
CineBook avoids heavy Redux boilerplate by using a multi-tiered modern approach:
1. **Server State:** Handled exclusively by `@tanstack/react-query`. Caches the Movie Details and Show Schedules. Hitting "Back" is instantaneous.
2. **Global Auth & UI State:** Handled by `Zustand`. Extremely lightweight, manages user sessions and UI toggles without React Context re-render issues.
3. **Form State:** `react-hook-form` paired with `@hookform/resolvers/zod` ensures forms are validated tightly before touching the backend.

**Ticket Generation & Scanning:**
Upon successful booking, the user is navigated to `PaymentSuccess`. 
1. `react-qr-code` generates a QR code string from the database `bookingId`.
2. `html2canvas-pro` converts the ticket DOM node into a canvas.
3. `jspdf` exports that canvas into a downloadable PDF for the user.

# 12. BACKEND ARCHITECTURE AND WORKING

**Middleware & Security:**
* **`helmet` & `express-mongo-sanitize`:** Protects Express headers and strips $ operators from payloads to prevent NoSQL injections.
* **`authMiddleware.js`:** Extracts token from `Authorization: Bearer <token>`. Uses `jwt.verify()`.
* **`adminMiddleware.js`:** Protects dashboard routes (`if (req.user.role !== 'admin') return res.status(403)`).

**Handling the 0-Dollar Edge Case:**
In `bookingController.js`, if a user applies enough CineCoins to drop the checkout total to 0, the system recognizes this dynamically (`const isConfirmed = stripePaymentIntentId || grandTotal === 0;`), completely bypasses the Stripe validation requirement, and natively confirms the booking!

# 13. DATABASE DESIGN AND DATA FLOW

**MongoDB Schemas (Mongoose):**

1. **User Schema:** Tracks `name`, `email`, `password`, `role`, and `cineCoins` balance.
2. **Show Schema:** Links `movie` and `theatre`. Contains an embedded `seatCategorySchema` holding `price`, `rows`, `seatsPerRow`, and `bookedSeats` arrays for each tier (`gold`, `platinum`, `recliner`).
3. **Booking Schema:** 
   * `bookingId`: Custom generated (e.g., `BK1234567890`).
   * `seats`: Array of `{ type, seatNumber }`.
   * `foodItems`: Array of `{ name, quantity, price }`.
   * Financials: `totalAmount`, `convenienceFee`, `gst`, `grandTotal`.
   * Payment tracking: `stripePaymentIntentId`, `stripeStatus`.
   * QR tracking: `isScanned` boolean.

# 14. AUTHENTICATION AND AUTHORIZATION

* **Flow:** `POST /api/auth/login` uses `bcryptjs.compare()` to verify passwords. On success, it signs a JWT payload `{ _id, role }` using `process.env.JWT_SECRET`.
* **Frontend Persistence:** Token stored in `localStorage`. Zustand store initializes by checking this token.
* **Admin Guard:** `adminMiddleware` further checks `if (req.user.role !== 'admin') return res.status(403)`.

# 15. BOOKING FLOW – COMPLETE END-TO-END WORKING

1. **Discovery:** User views a Movie.
2. **Show Selection:** User selects a Theatre and Time (e.g., 9:00 PM, Screen 1, 3D format).
3. **Seat Matrix:** User connects to WebSocket room. Frontend renders `rows` and `seatsPerRow` for Gold/Platinum tiers. Booked seats render disabled. User clicks seats; local state updates base price.
4. **Add-ons:** User selects popcorn (FoodItems).
5. **Payment Gateway:** Frontend requests `/api/payment/intent` with the `grandTotal`. Stripe generates `client_secret`.
6. **DB Commit:** On Stripe success, frontend POSTs the massive payload to `/api/bookings`. 
7. **Confirmation:** Backend locks seats, updates CineCoins, fires Socket event, sends Email.
8. **Success Page:** User sees their unique `BK...` ID and a dynamically generated QR code, and can download a PDF.

# 16. PAYMENT FLOW (STRIPE INTEGRATION)

* **Why Stripe?** Industry-leading security. The backend never touches the credit card number.
* **Flow:** 
  1. `paymentController.js` initializes the Stripe SDK.
  2. It creates a `PaymentIntent` passing the amount (converted to Paise).
  3. The `client_secret` is returned to the frontend.
  4. Frontend uses `@stripe/react-stripe-js` `<Elements>` provider to render the secure card input.
  5. Frontend calls `stripe.confirmCardPayment(clientSecret)`.
  6. Upon success, frontend proceeds to hit the booking creation API.

# 17. TICKET / QR / EMAIL CONFIRMATION FLOW

* **Ticket Generation:** Happens natively inside the `Booking` document creation.
* **QR Code:** The frontend takes this `bookingId` string and renders it into a scannable QR Code.
* **Nodemailer:** Inside `bookingController.js`, `sendBookingConfirmationEmail()` is invoked. It takes the user's details and seat list, formatting them into an HTML email.
* **Venue Scanning:** Staff users route to `/staff/scanner`. When they scan the QR via `html5-qrcode`, it hits an API that flips the Booking's `isScanned` boolean to `true`.

# 21. REAL-WORLD ENGINEERING CHALLENGES SOLVED

1. **The Concurrency Problem (Race Conditions):** Handled via dual layers. Socket.io visually warns users instantly, but the ultimate source of truth is the atomic backend validation that checks `bookedSeats.includes(seatNumber)` mere milliseconds before creating the Booking document.
2. **Financial Integrity:** Frontend cannot be trusted with pricing. The backend dynamically rebuilds the price (Base + Food + 5% Fee + 18% GST - CineCoins) ensuring hackers cannot modify network payloads to pay $0.
3. **Storage Scaling:** By implementing `multer-s3` and `aws-sdk`, image storage is completely decoupled from the Node.js runtime, ensuring the server doesn't crash from disk bloat.

---

# 22. SECURITY CONSIDERATIONS

* **PCI Compliance:** Handled entirely by offloading raw credit card processing to Stripe Elements.
* **Authentication Security:** Passwords hashed with `bcryptjs`. JWT used for stateless session management, preventing CSRF/Session hijacking.
* **Idempotency:** Unique `bookingId` strings prevent duplicate DB entries. 
* **Role-Based Routing:** Admin APIs strictly reject non-admin JWTs.

---

# 23. PERFORMANCE AND SCALABILITY DISCUSSION

* **Current Optimization:** React Query caches the Movie lists, resulting in instantaneous page loads after the initial fetch.
* **WebSocket Optimization:** Socket events are emitted strictly to specific `rooms` (using `io.to(showId.toString()).emit`), meaning only users looking at a specific show receive socket updates, saving immense server bandwidth.
* **Scaling Future:** MongoDB indexing on `Show.movie` and `Booking.user` would be the next step for massive scale.

---

# 24. ERROR HANDLING AND EDGE CASES

* **Stale UI Checkout:** If a user idles on the payment page for an hour, their selected seat might be bought by someone else. When they finally pay, the backend will catch the overlap, throw a 400 error, and the frontend will alert the user to re-select seats.
* **Insufficient CineCoins:** Backend mathematically verifies if the user actually possesses the `cineCoins` they claim to be spending.
* **Invalid Seat Types:** Backend rejects payloads requesting a seat type that doesn't exist on that specific `Show` document.

# 32. VIVA / INTERVIEW QUESTIONS AND ANSWERS (ULTIMATE LEVEL)

### Architecture & WebSockets
**Q: How did you implement real-time seat updates?**
*A: I used Socket.io. When a user opens the Seat Selection page, the frontend joins a specific Socket 'room' based on the `showId`. When any user successfully books, the Express backend calls `io.to(showId).emit("seatsBooked")`. The frontend listens for this event and instantly greys out those seats without requiring a page refresh.*

### Frontend State Management
**Q: Why did you choose Zustand and React Query over Redux?**
*A: Redux requires massive boilerplate. Ticketing platforms rely on server-state (fetching inventory). `React Query` handles server-state caching perfectly. For global client-state (like Auth), I used `Zustand` because it avoids the re-render cascades inherent in React Context, while being significantly lighter than Redux.*

### Security & Validations
**Q: How are you ensuring payload data (like prices or admin inputs) is secure?**
*A: I use `Zod` on both the frontend (via `react-hook-form` resolvers) and backend. The backend strictly recalculates all financial totals directly from database parameters, meaning any tampered `grandTotal` sent from the frontend is ignored. Furthermore, I use `helmet` and `express-mongo-sanitize` to strip out NoSQL injection attempts.*

### The CineCoins Logic
**Q: How does the CineCoins feature work alongside Stripe?**
*A: Users earn 5% of their total transaction back in CineCoins. If they use coins on a future booking, the backend subtracts the coin value from the `grandTotal`. I had to write an edge-case handler: if `grandTotal === 0` (coins covered the whole cost), the backend entirely skips the Stripe confirmation requirement and auto-confirms the booking.*

### Ticket Generation
**Q: Explain how the PDF and QR code ticketing works.**
*A: The unique `Booking ID` generated by MongoDB is passed to the frontend. `react-qr-code` renders it visually. I then use `html2canvas-pro` to snapshot the entire ticket DOM element into a base64 canvas, which is passed into `jspdf` to trigger a browser-side PDF download. To validate tickets, staff use an `html5-qrcode` integration that accesses the device camera, scans the QR, and hits an API to flip the `isScanned` boolean in MongoDB.*
